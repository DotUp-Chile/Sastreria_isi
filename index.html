<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sastrería Ibarra | Especialistas en Trajes a Medida en Santiago</title>

<meta name="description" content="Especialistas en trajes a medida y ajuste perfecto en Santiago. Más de 20 años de experiencia en alta sastrería para novios, ejecutivos y eventos.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ========================= VARIABLES ========================= */
:root{
 --color-dark:#141414;
 --color-dark-2:#0e0e0e;
 --color-gold:#c9a96e;
 --color-gold-soft:#e5d2a3;
 --color-light:#f4f1ea;
 --color-white:#ffffff;
 --color-gray:#a0a0a0;
 --container:1200px;
}

/* ========================= RESET ========================= */
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

html{ scroll-behavior:smooth; }

body{
 font-family:'Inter',sans-serif;
 background:var(--color-dark);
 color:var(--color-white);
 overflow-x:hidden;
}

/* ========================= TIPOGRAFÍA ========================= */
h1,h2,h3{
 font-family:'Playfair Display',serif;
 font-weight:600;
 letter-spacing:0.5px;
}

h1{ font-size:clamp(2.5rem,5vw,4rem); }

h2{
 font-size:clamp(2rem,4vw,2.8rem);
 margin-bottom:2rem;
 text-align:center;
 position:relative;
 display:inline-block;
 padding-bottom:15px;
}

h2::after{
 content:"";
 position:absolute;
 bottom:0;
 left:50%;
 transform:translateX(-50%);
 width:0;
 height:2px;
 background:var(--color-gold);
 transition:0.6s ease;
}

section:hover h2::after{
 width:80px;
}

p{
 line-height:1.8;
 color:var(--color-gray);
}

/* ========================= CONTAINER ========================= */
.container{
 max-width:var(--container);
 margin:auto;
 padding:0 2rem;
}

/* ========================= HEADER ========================= */
header{
 position:fixed;
 top:0;
 width:100%;
 z-index:1000;
 background:transparent;
 transition:0.4s ease;
}

header.scrolled{
 background:rgba(0,0,0,0.85);
}

.nav{
 display:flex;
 justify-content:space-between;
 align-items:center;
 height:70px;
}

.logo{
 font-size:1.6rem;
 color:var(--color-gold);
}

.nav-links{
 display:flex;
 gap:2rem;
 list-style:none;
}

.nav-links a{
 text-decoration:none;
 color:white;
 font-size:0.95rem;
 opacity:0.85;
 position:relative;
}

.nav-links a::after{
 content:"";
 position:absolute;
 bottom:-6px;
 left:0;
 width:0%;
 height:1px;
 background:var(--color-gold);
 transition:0.3s;
}

.nav-links a:hover::after{
 width:100%;
}

/* ========================= HERO ========================= */
.hero{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 position:relative;
 overflow:hidden;
 background:
 linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.8)),
 url("https://github.com/DotUp-Chile/Sastreria_isi/blob/main/hero.jpeg?raw=true");
 background-size:cover;
 background-position:center;
 background-attachment:fixed;
}

.hero-content{
 max-width:800px;
}

.hero-content span{
 color:var(--color-gold);
 letter-spacing:3px;
 font-size:0.85rem;
 text-transform:uppercase;
}

.hero-content h1{
 margin-top:20px;
}

.hero-content p{
 margin:1.5rem 0;
 font-size:1.1rem;
}

/* FadeUp */
.hero-content span,
.hero-content h1,
.hero-content p,
.hero-content .btn{
 opacity:0;
 transform:translateY(40px);
 animation:fadeUp 1s ease forwards;
}

.hero-content span{ animation-delay:0.3s; }
.hero-content h1{ animation-delay:0.6s; }
.hero-content p{ animation-delay:0.9s; }
.hero-content .btn{ animation-delay:1.2s; }

@keyframes fadeUp{
 to{
  opacity:1;
  transform:translateY(0);
 }
}

/* ========================= BOTÓN ========================= */
.btn{
 position:relative;
 overflow:hidden;
 display:inline-block;
 background:var(--color-gold);
 color:black;
 padding:14px 34px;
 text-decoration:none;
 font-weight:600;
 letter-spacing:1px;
 transition:all 0.3s ease;
}

.btn::before{
 content:"";
 position:absolute;
 top:0;
 left:-100%;
 width:100%;
 height:100%;
 background:linear-gradient(
 120deg,
 transparent,
 rgba(255,255,255,0.5),
 transparent
 );
 transition:0.6s;
}

.btn:hover::before{
 left:100%;
}

/* ========================= SECCIONES ========================= */
section{
 padding:120px 0;
 position:relative;
}

section::before{
 content:"";
 position:absolute;
 top:0;
 left:50%;
 transform:translateX(-50%);
 width:90%;
 height:1px;
 background:rgba(255,255,255,0.05);
}

.section-dark{ background:var(--color-dark); }
.section-dark-2{ background:var(--color-dark-2); }

.section-light{
 background:var(--color-light);
 color:black;
}

.section-light p{ color:#444; }

/* ========================= REVEAL ========================= */
.reveal{
 opacity:0;
 transform:translateY(60px);
 transition:all 0.8s ease;
}

.reveal.active{
 opacity:1;
 transform:translateY(0);
}

/* ========================= WHATSAPP ========================= */
.whatsapp-btn{
 position:fixed;
 bottom:30px;
 right:30px;
 background:#25D366;
 width:65px;
 height:65px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:50%;
 box-shadow:0 10px 30px rgba(0,0,0,0.4);
 transition:all 0.3s ease;
 z-index:999;
}

.whatsapp-btn.hidden{
 opacity:0;
 pointer-events:none;
 transform:translateY(20px);
}

.whatsapp-btn:hover{
 transform:translateY(-5px) scale(1.1);
}

</style>
</head>

<body>

<header>
<div class="container nav">
<div class="logo">Sastrería Ibarra</div>
<ul class="nav-links">
<li><a href="#servicios">Servicios</a></li>
<li><a href="#proceso">Proceso</a></li>
<li><a href="#galeria">Galería</a></li>
<li><a href="#contacto">Contacto</a></li>
</ul>
</div>
</header>
